name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Find Project Root and Build
        run: |
          # gradlew ෆයිල් එක තියෙන ෆෝල්ඩර් එක සොයා ගැනීම
          GRADLEW_PATH=$(find . -name "gradlew" -print -quit)
          
          if [ -z "$GRADLEW_PATH" ]; then
            echo "Error: gradlew file not found anywhere in the repository!"
            exit 1
          fi
          
          # එම ෆෝල්ඩර් එක ඇතුළට යාම
          PROJECT_DIR=$(dirname "$GRADLEW_PATH")
          cd "$PROJECT_DIR"
          
          echo "Found gradlew in: $PROJECT_DIR"
          
          # Permissions දීම සහ Build කිරීම
          chmod +x gradlew
          ./gradlew assembleDebug
          
          # ඊළඟ step එකට APK එක ගන්න පුළුවන් වෙන්න path එක save කර ගැනීම
          echo "APK_PATH=$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk" >> $GITHUB_ENV

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: |
            **/app/build/outputs/apk/debug/app-debug.apk
            
